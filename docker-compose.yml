# Infra de desenvolvimento no MiniDeskServer (192.168.50.92).
# Sobe Postgres + MinIO (S3-compatível) e cria o bucket público de imagens.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: loja
      POSTGRES_PASSWORD: loja3d_dev
      POSTGRES_DB: loja3d
    ports:
      - "5433:5432"
    volumes:
      - loja3d_pg:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: loja3d
      MINIO_ROOT_PASSWORD: loja3d_dev_secret
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # console web
    volumes:
      - loja3d_minio:/data

  # Job único: cria o bucket e libera leitura pública (as URLs de imagem são públicas)
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 loja3d loja3d_dev_secret;
      mc mb --ignore-existing local/loja3d;
      mc anonymous set download local/loja3d;
      exit 0"

volumes:
  loja3d_pg:
  loja3d_minio:
